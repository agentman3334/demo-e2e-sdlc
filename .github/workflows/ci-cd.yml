name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JF_URL: ${{ secrets.JFROG_URL }}
  JF_USERNAME: ${{ secrets.JFROG_USERNAME }}
  JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
  JF_BUILD_NAME: pms-build
  JF_BUILD_NUMBER: ${{ github.run_number }}
  JF_PROJECT: ${{ secrets.JFROG_PROJECT }}

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with Ruff
        run: |
          ruff check app/ --output-format=github || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pms_test
          SECRET_KEY: test-secret-key
        run: |
          pytest --tb=short -q || true

  lint-and-test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: |
          npx eslint src/ --ext .js,.jsx || true

      - name: Build
        run: npm run build

  build-and-push:
    needs:
      - lint-and-test-backend
      - lint-and-test-frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Configure JFrog CLI
        run: |
          jf config add jfrog \
            --url=https://${{ env.JF_URL }} \
            --user=${{ env.JF_USERNAME }} \
            --access-token=${{ env.JF_ACCESS_TOKEN }} \
            --interactive=false

          jf config use jfrog

      - name: Add Git Info to Build
        run: |
          jf rt build-add-git \
            "${{ env.JF_BUILD_NAME }}" \
            "${{ env.JF_BUILD_NUMBER }}" .
            
      - name: Test JFrog Docker Auth API
        run: |
          curl -v \
            -u "${{ env.JF_USERNAME }}:${{ env.JF_PASSWORD }}" \
            "https://${{ env.JF_URL }}/artifactory/api/docker/docker-dev-local/v2/auth"
      
      - name: Docker Login
        run: |
          echo "${{ env.JF_PASSWORD }}" | docker login ${{ env.JF_URL }} \
            -u "${{ env.JF_USERNAME }}" \
            --password-stdin

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.JF_URL }}/docker-dev-local/pms-backend:${{ github.sha }} \
            -t ${{ env.JF_URL }}/docker-dev-local/pms-backend:latest \
            ./backend

      - name: Push Backend Image
        run: |
          jf docker push \
            ${{ env.JF_URL }}/docker-dev-local/pms-backend:${{ github.sha }} \
            --build-name ${{ env.JF_BUILD_NAME }} \
            --build-number ${{ env.JF_BUILD_NUMBER }} \
            --project ${{ env.JF_PROJECT }}

          jf docker push \
            ${{ env.JF_URL }}/docker-dev-local/pms-backend:latest \
            --build-name ${{ env.JF_BUILD_NAME }} \
            --build-number ${{ env.JF_BUILD_NUMBER }} \
            --project ${{ env.JF_PROJECT }}

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.JF_URL }}/docker-dev-local/pms-frontend:${{ github.sha }} \
            -t ${{ env.JF_URL }}/docker-dev-local/pms-frontend:latest \
            ./frontend

      - name: Push Frontend Image
        run: |
          jf docker push \
            ${{ env.JF_URL }}/docker-dev-local/pms-frontend:${{ github.sha }} \
            --build-name ${{ env.JF_BUILD_NAME }} \
            --build-number ${{ env.JF_BUILD_NUMBER }} \
            --project ${{ env.JF_PROJECT }}

          jf docker push \
            ${{ env.JF_URL }}/docker-dev-local/pms-frontend:latest \
            --build-name ${{ env.JF_BUILD_NAME }} \
            --build-number ${{ env.JF_BUILD_NUMBER }} \
            --project ${{ env.JF_PROJECT }}

      - name: Publish Build Info
        run: |
          jf rt build-publish \
            "${{ env.JF_BUILD_NAME }}" \
            "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}"

  sonarcloud:
    needs:
      - lint-and-test-backend
      - lint-and-test-frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
