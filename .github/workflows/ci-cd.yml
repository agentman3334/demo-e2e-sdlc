name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JF_URL: ${{ secrets.JFROG_URL }}
  JF_ACCESS_TOKEN: ${{ secrets.JFROG_PASS }}
  JF_BUILD_NAME: pms-build
  JF_BUILD_NUMBER: ${{ github.run_number }}
  JF_PROJECT: ${{ secrets.JFROG_PROJECT }}

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --output-format=github || true
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pms_test
          SECRET_KEY: test-secret-key
        run: pytest --tb=short -q || true

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint
        run: npx eslint src/ --ext .js,.jsx || true
      - name: Build
        run: npm run build

  build-and-push:
    needs: [lint-and-test-backend, lint-and-test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4

      - name: Configure JFrog CLI
        run: |
          jf config add manual-jfrog \
            --url https://${{ env.JF_URL }} \
            --access-token ${{ env.JF_ACCESS_TOKEN }} \
            --interactive=false
          jf config use manual-jfrog

      - name: Add Git Info to Build
        run: |
          jf rt build-add-git "${{ env.JF_BUILD_NAME }}" "${{ env.JF_BUILD_NUMBER }}" .

      - name: Build frontend
        working-directory: frontend
        run: npm install --legacy-peer-deps && npm run build

      - name: Upload Frontend Artifacts to JFrog Artifactory
        run: |
          VERSION_TAG="${{ github.sha }}"
          ENV_NAME="dev"

          ARTIFACT_PATH="frontend/dist/"
          TARGET_REPO="git-repo"
          TARGET_PATH="${TARGET_REPO}/pms-builds/${ENV_NAME}/${VERSION_TAG}/"

          echo "Uploading: ${ARTIFACT_PATH} -> ${TARGET_PATH}"

          jf rt upload \
            --build-name "${{ env.JF_BUILD_NAME }}" \
            --build-number "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}" \
            --recursive \
            "${ARTIFACT_PATH}**" \
            "${TARGET_PATH}"

          echo "Upload complete! https://${{ env.JF_URL }}/artifactory/${TARGET_PATH}"

      - name: Upload Backend Artifacts to JFrog Artifactory
        run: |
          VERSION_TAG="${{ github.sha }}"
          ENV_NAME="dev"

          ARTIFACT_PATH="backend/"
          TARGET_REPO="git-repo"
          TARGET_PATH="${TARGET_REPO}/pms-backend/${ENV_NAME}/${VERSION_TAG}/"

          echo "Uploading: ${ARTIFACT_PATH} -> ${TARGET_PATH}"

          jf rt upload \
            --build-name "${{ env.JF_BUILD_NAME }}" \
            --build-number "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}" \
            --recursive \
            --exclude-patterns="*__pycache__*;*.pyc;*.egg-info*;venv/*;.venv/*" \
            "${ARTIFACT_PATH}**" \
            "${TARGET_PATH}"

          echo "Upload complete! https://${{ env.JF_URL }}/artifactory/${TARGET_PATH}"

      - name: Publish Build Info to JFrog
        run: |
          jf rt build-publish "${{ env.JF_BUILD_NAME }}" "${{ env.JF_BUILD_NUMBER }}" \
            --project "${{ env.JF_PROJECT }}"

          echo "Build info published! Build URL: https://${{ env.JF_URL }}/ui/builds/${{ env.JF_BUILD_NAME }}/${{ env.JF_BUILD_NUMBER }}"

  sonarcloud:
    needs: [lint-and-test-backend, lint-and-test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
